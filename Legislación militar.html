<script>
const preguntas =
[{"num": 1, "contexto": "El Código de Justicia Militar clasifica los delitos atendiendo a la naturaleza de la acción y la intención del sujeto activo.", "pregunta": "Es intencional el que se comete con:", "opciones": ["el ánimo de causar daño o de violar la ley.", "imprevisión, negligencia, impericia, falta de reflexión o de cuidado.", "la omisión de un deber que la ley impone al militar en actos del servicio.", "el propósito de obtener una recompensa o distinción de manera fraudulenta."], "correcta": 0}, {"num": 2, "contexto": "En la clasificación de los delincuentes, el Código de Justicia Militar especifica quiénes adquieren la categoría de autores por omisión de sus deberes de mando.", "pregunta": "Son autores de un delito:", "opciones": ["los que ocultan a sabiendas la verdad sobre un hecho del servicio ante la autoridad superior.", "los que ayudan a los autores de un delito en los preparativos de éste.", "los que sin previo concierto con los delincuentes, los favorecen auxiliándolos para que se aprovechen de los instrumentos con que se comete el delito.", "los que teniendo por su empleo o comisión el deber de impedir o de castigar un delito, se obligan con el delincuente a no estorbarle que lo cometa."], "correcta": 3}, {"num": 3, "contexto": "La Ley de Ascensos y Recompensas (LAREFAGN) establece definiciones claras para los conceptos que rigen la trayectoria profesional de los militares.", "pregunta": "¿Cómo se define el concepto de 'Ascenso'?", "opciones": ["el proceso mediante el cual la Secretaría verifica el cumplimiento de los requisitos fijados por la Ley para otorgar o proponer los ascensos respectivos.", "las condecoraciones, menciones honoríficas, distinciones y citaciones que se otorgan a las personas civiles o militares para premiar su heroísmo.", "el acto de mando mediante el cual es conferido al militar un grado superior en el orden jerárquico del Ejército, Fuerza Aérea y Guardia Nacional.", "el militar con jerarquía hasta de Mayor del Ejército, Fuerza Aérea y Guardia Nacional que sustenta exámenes para cubrir una vacante."], "correcta": 2}, {"num": 4, "contexto": "El Código de Justicia Militar establece los diversos grados en que un delito puede manifestarse durante su ejecución.", "pregunta": "El conato consiste en:", "opciones": ["ejecutar uno o más hechos encaminados directa e inmediatamente a la consumación de un delito, si éste no se consuma por causas ajenas a la voluntad del agente.", "cuando el agente emplea medios inadecuados para la realización del delito, resultando este irrealizable por su propia naturaleza.", "el momento en que se produce el daño o se viola la ley penal mediante una acción u omisión voluntaria.", "ejecutar todos los actos necesarios para la consumación, pero ésta no se verifica por causas accidentales."], "correcta": 0}, {"num": 5, "contexto": "La Ley de Disciplina define los instrumentos coercitivos que la autoridad puede aplicar para mantener el orden y el respeto a las leyes militares.", "pregunta": "¿Qué es el 'Correctivo disciplinario'?", "opciones": ["la norma a la que los militares deben ajustar su conducta; tiene como bases la obediencia, y un alto concepto del honor, de la justicia y de la moral.", "la medida coercitiva que se impone a todo militar del Ejército, Fuerza Aérea y Guardia Nacional, por haber infringido las leyes o reglamentos militares, siempre y cuando no constituyan un delito.", "la sanción que consiste en la separación del empleo hasta por treinta días, sin goce de haberes y demás emolumentos.", "el proceso administrativo por el cual el Consejo de Honor determina la mala conducta de un individuo de tropa."], "correcta": 1}, {"num": 6, "contexto": "El Código de Justicia Militar define las situaciones en las que un delito no es intencional, basándose en la falta de previsión del militar.", "pregunta": "Es de imprudencia el que se comete por:", "opciones": ["el ánimo de causar daño o de violar la ley en actos del servicio.", "el deseo de evadir el cumplimiento de una misión legítima encomendada.", "la omisión de un deber legal por un impedimento legítimo o insuperable.", "imprevisión, negligencia, impericia, falta de reflexión o de cuidado y que causa igual daño que un delito intencional."], "correcta": 3}, {"num": 7, "contexto": "En la Ley del ISSFAM, el cómputo de la antigüedad es fundamental para determinar el derecho a las prestaciones de seguridad social.", "pregunta": "El tiempo de servicios comprende:", "opciones": ["únicamente el tiempo efectivo de servicios prestados en unidades de combate o dependencias técnicas.", "tanto el de los efectivos como el de los abonos y será computado en la forma establecida en la Ley para la Comprobación, Ajuste y Cómputo de Servicios.", "el periodo transcurrido desde la fecha de ingreso al plantel de formación hasta la baja del activo.", "la sumatoria de los años de servicios efectivos sin considerar las licencias ordinarias mayores a seis meses."], "correcta": 1}, {"num": 8, "contexto": "La Ley de Ascensos y Recompensas (LAREFAGN) describe el procedimiento administrativo para la evaluación de los candidatos al grado superior.", "pregunta": "¿Qué es la 'Promoción'?", "opciones": ["el acto de mando mediante el cual es conferido al militar un grado superior en el orden jerárquico.", "el proceso mediante el cual la Secretaría verifica el cumplimiento de los requisitos fijados por la Ley para otorgar o proponer los ascensos respectivos.", "el conjunto de exámenes que tiene por objeto evaluar al personal para seleccionar al mejor preparado.", "las listas nominales de Generales, Jefes, Oficiales y Sargentos profesionales en el servicio activo."], "correcta": 1}, {"num": 9, "contexto": "El Código de Justicia Militar contempla el delito de conspiración como una resolución previa a la ejecución de ciertos actos contra la disciplina.", "pregunta": "Hay conspiración siempre que:", "opciones": ["un grupo de cinco militares rehúse obedecer las órdenes de un superior o las resista mediante vías de hecho.", "dos o más personas resuelven de concierto cometer el delito acordando los medios de llevar a efecto su determinación.", "un militar deliberadamente deje de ejecutar una orden del servicio o la modifique de propia autoridad.", "el personal militar reunido tumultuariamente en número de diez o más resista a una autoridad legítima."], "correcta": 1}, {"num": 10, "contexto": "El Reglamento General de Deberes Militares enfatiza la solidaridad que debe prevalecer entre los miembros de las fuerzas armadas.", "pregunta": "De acuerdo con el Artículo 12 del Reglamento, los militares tienen el deber de:", "opciones": ["informar verbalmente al superior sobre las faltas cometidas por el personal de su mismo grado.", "solicitar licencias ilimitadas cuando sus asuntos personales interfieran con el desempeño de su cargo.", "prestar siempre que les sea posible su ayuda moral y material a sus inferiores y compañeros que la necesiten.", "vigilar que sus superiores jerárquicos cumplan con las normas de etiqueta y cortesía en actos civiles."], "correcta": 2}, {"num": 11, "contexto": "El Código de Justicia Militar define de forma precisa a las agrupaciones de militares durante los actos oficiales.", "pregunta": "Por tropa formada se entiende:", "opciones": ["el tipo de estacionamiento de las tropas bajo tiendas de campaña o barracas para fines de adiestramiento.", "la reunión de cualquier número de militares colocados ordenadamente para todo acto del servicio.", "el personal militar con las jerarquías de soldado hasta la de sargento primero en el activo.", "la fuerza armada que se encuentra desempeñando una misión de armas con el empleo de equipo bélico."], "correcta": 1}, {"num": 12, "contexto": "La Ley de Disciplina establece las facultades del Consejo de Honor respecto a las sanciones que afectan la permanencia en el grado.", "pregunta": "Es una facultad del Consejo de Honor dictaminar sobre:", "opciones": ["los ascensos post mortem de los militares caídos en acciones de armas.", "los castigos correccionales que deban imponerse desde Capitán 1o. hasta el Soldado.", "las pensiones alimenticias de los derechohabientes de los oficiales en situación de retiro.", "los cambios de adscripción por necesidades operativas del servicio determinados por el Alto Mando."], "correcta": 1}, {"num": 13, "contexto": "El Código de Justicia Militar prevé figuras legales que aumentan o disminuyen la responsabilidad criminal del acusado.", "pregunta": "Las circunstancias que disminuyan o aumenten la responsabilidad criminal del acusado serán:", "opciones": ["fijadas exclusivamente por el Código Penal Federal en su aplicación supletoria técnica.", "determinadas por el Fiscal General de Justicia Militar al momento de formular la imputación.", "establecidas y calificadas por el juez, a su arbitrio, tomando en cuenta la naturaleza de la acción.", "ratificadas por el Consejo de Honor tras el análisis de la hoja de actuación del procesado."], "correcta": 2}, {"num": 14, "contexto": "La Ley del ISSFAM define los alcances de la cobertura médica que el Instituto debe proporcionar a sus beneficiarios.", "pregunta": "El servicio médico integral comprende:", "opciones": ["únicamente la atención dental preventiva y correctiva en unidades médicas de primer nivel.", "el tratamiento de enfermedades contraídas exclusivamente durante actos del servicio en campaña.", "la asistencia médica, quirúrgica, obstétrica, farmacéutica y hospitalaria, así como aparatos de prótesis y ortopedia.", "la provisión de medicamentos de patente y consultas de especialidad en instituciones civiles subrogadas."], "correcta": 2}, {"num": 15, "contexto": "El Reglamento de la Ley de Ascensos (RLAREFAM) establece los requisitos mínimos de rendimiento físico para el personal.", "pregunta": "Para resultar apto en las pruebas de capacidad física se debe obtener en la sumatoria total de los tres ejercicios:", "opciones": ["80 puntos, siempre que no califique con cero en la carrera de resistencia de 12 minutos.", "70 puntos o más en la sumatoria total de los ejercicios físicos presentados en el certamen.", "50 puntos como promedio general entre la prueba de resistencia y la de fuerza de brazos.", "60 puntos o más, siendo obligatorio presentar los tres ejercicios y obtener la puntuación mínima en cada uno."], "correcta": 3}, {"num": 16, "contexto": "El Código de Justicia Militar establece los supuestos en los que se considera que existe una repetición de la conducta delictiva.", "pregunta": "Hay reincidencia siempre que el condenado por sentencia ejecutoria cometa un nuevo delito, si:", "opciones": ["el nuevo delito es del mismo género que el anterior, independientemente del tiempo transcurrido.", "no ha transcurrido un término igual al de la prescripción de la pena desde el cumplimiento de la condena.", "la nueva infracción se comete durante el desempeño de una comisión técnica fuera del país.", "el procesado se encuentra bajo los efectos de una suspensión de empleo o comisión militar."], "correcta": 1}, {"num": 17, "contexto": "La Ley de Ascensos y Recompensas (LAREFAGN) clasifica las distinciones que se otorgan al personal por su desempeño sobresaliente.", "pregunta": "¿Qué son las 'Recompensas'?", "opciones": ["el acto de mando mediante el cual es conferido al militar un grado superior en el orden jerárquico.", "las condecoraciones, menciones honoríficas, distinciones y citaciones que se otorgan para premiar su heroísmo, capacidad profesional o servicios a la Patria.", "el proceso administrativo de verificación de antecedentes para la promoción de los jefes.", "los sobresueldos y primas de perseverancia que se integran al haber mensual del militar."], "correcta": 1}, {"num": 18, "contexto": "El Código de Justicia Militar define cuándo se considera que una persona ha participado de forma indirecta en la comisión de un ilícito.", "pregunta": "Son cómplices los que:", "opciones": ["ejecutan hechos que son la causa impulsiva del delito o que se encaminan inmediata y directamente a su ejecución.", "ayudan a los autores de un delito en los preparativos de éste, facilitándoles los medios para su realización.", "sin previo concierto con los delincuentes, los favorecen auxiliándolos para que se aprovechen de los instrumentos.", "teniendo por su empleo o comisión el deber de impedir un delito, se obligan con el delincuente a no estorbarle."], "correcta": 1}, {"num": 19, "contexto": "El Reglamento General de Deberes Militares establece la obligatoriedad del conocimiento de la norma para evitar sanciones por ignorancia.", "pregunta": "Para que no ignoren las responsabilidades en que incurren, los militares deberán conocer con minuciosidad:", "opciones": ["los tratados internacionales en materia de derechos humanos y el uso de la fuerza.", "las leyes militares y reglamentos que se relacionen con su situación en el Ejército.", "los códigos civiles y penales de todas las entidades federativas de la República.", "los reglamentos interiores de las escuelas y hospitales civiles donde realicen prácticas."], "correcta": 1}, {"num": 20, "contexto": "El Código de Justicia Militar define las características esenciales de la unidad de transporte aéreo para fines legales.", "pregunta": "Por aeronave se entiende:", "opciones": ["todo aparato capaz de remontarse o circular por los aires.", "el material volante destinado exclusivamente a operaciones de combate estratégico.", "las unidades de ala fija o rotativa que cuenten con matrícula militar oficial.", "cualquier vehículo impulsado por motores térmicos para el transporte de tropas."], "correcta": 0}, {"num": 21, "contexto": "En el Título Séptimo del Libro Segundo del Código de Justicia Militar, se especifican condiciones bajo las cuales el personal de oficiales incurre en conductas delictivas relacionadas con la marcha de sus unidades.", "pregunta": "Serán considerados también como desertores, los oficiales:", "opciones": ["Que con pretexto de enfermedad u otro motivo ilegítimo se queden en las poblaciones, sin el correspondiente permiso, cuando marchen las fuerzas a que pertenezcan.", "Que se atribuyan o atribuyan a la persona a cuyo nombre extienda el documento, un nombre o una investidura, calidad o circunstancia que no tenga.", "Que sin la autorización judicial previa soliciten la localización geográfica en tiempo real de los equipos de comunicación móvil asociados a una línea.", "Que den órdenes de interés personal a una persona subordinada o estorbaren sin motivo justificado la ejecución de las que ésta hubiere dado."], "correcta": 0}, {"num": 22, "contexto": "La Ley de Ascensos y Recompensas (LAREFAGN) establece un sistema de estímulos para reconocer hechos destacados que no necesariamente alcanzan el nivel de una condecoración.", "pregunta": "Las Citaciones se otorgarán cuando a juicio del Comandante de una Unidad o Jefe de una Dependencia deba estimularse:", "opciones": ["el acto de mando mediante el cual es conferido al militar un grado superior en el orden jerárquico del Ejército, Fuerza Aérea y Guardia Nacional.", "un hecho meritorio ejecutado por uno o más militares a sus órdenes, publicándose en la Orden Particular, dando cuenta a la Secretaría.", "un incremento presupuestal en los haberes de retiro, pensión o compensación para el personal que cause baja del activo por enfermedad.", "la separación del empleo hasta por treinta días, sin goce de haberes y demás emolumentos, así como la interrupción del tiempo de servicios."], "correcta": 1}, {"num": 23, "contexto": "La Ley del ISSFAM define con precisión jurídica los términos relacionados con el sustento económico de los familiares supérstites del personal militar.", "pregunta": "¿Cómo se define el concepto de 'Pensión'?", "opciones": ["es el pago mensual al que tienen derecho los militares que hayan llegado a la edad límite o que soliciten su retiro voluntariamente.", "es el acto de mando mediante el cual se otorgan condecoraciones para premiar la capacidad profesional o servicios a la Patria.", "es la prestación económica vitalicia a que tienen derecho los familiares de los militares en los casos y condiciones que fije esta Ley.", "es el beneficio económico que se otorga únicamente por causar baja del activo y alta en situación de retiro por incapacidad."], "correcta": 2}, {"num": 24, "contexto": "El Reglamento General de Deberes Militares especifica la cadena de mando inmediata a la que el personal debe subordinación y conocimiento directo.", "pregunta": "El militar tendrá como inmediatos superiores, al cabo de su Escuadra o Unidad similar, al sargento 2º de su Pelotón, sargento 1º, oficiales de su Sección y:", "opciones": ["las clases y oficiales procedentes del Servicio Militar Nacional, quienes permanecerán en esta reserva hasta los 36 años de edad.", "la persona titular de la dirección general de dicha arma, que deberá ostentar la jerarquía de General en activo en el servicio.", "los militares que por disposición legal asciendan al grado inmediato únicamente para efectos de retiro.", "capitanes de su compañía, Escuadrón o Batería, teniendo obligación de conocer los nombres de todos ellos."], "correcta": 3}, {"num": 25, "contexto": "El Código de Justicia Militar delimita las circunstancias bajo las cuales la falta de respeto o sujeción se considera cometida dentro de los actos del servicio.", "pregunta": "Se entenderá que la insubordinación se comete en el servicio:", "opciones": ["Cuando el personal subordinado y el superior o solamente uno de ellos se encuentre en servicio.", "Cuando el personal subordinado ejecute uno o más hechos encaminados directa e inmediatamente a la consumación de un delito. [CJM General]", "Cuando se proporcione información falsa o se retrase deliberada e injustificadamente la entrega de la misma vinculada con una investigación.", "Cuando se expida certificado con objeto de comprobar servicios militares sabiendo que es falso lo que certifica."], "correcta": 0}, {"num": 26, "contexto": "La LAREFAGN prevé una compensación económica para el personal de los Servicios cuyos escalafones no alcanzan la jerarquía máxima de las Armas.", "pregunta": "Los militares de Servicio que figuren en escalafones en los que haya un grado tope inferior a los de las Armas, al cumplir cinco años de antigüedad tendrán derecho a percibir:", "opciones": ["el pago de la suma asegurada por incapacidad, lo cual excluye el pago de la suma asegurada por fallecimiento del militar.", "un sobrehaber complementario, equivalente al veinte por ciento de la diferencia entre el propio de su grado y el inmediato superior.", "una gratificación por haber sido separado del activo por no ser necesarios sus servicios o al término de su contrato.", "el sueldo base de servidor público que se señala en el tabulador para servidores públicos superiores y mandos medios."], "correcta": 1}, {"num": 27, "contexto": "La Ley de Disciplina establece correctivos que impactan la situación administrativa del personal militar por faltas a la conducta.", "pregunta": "La suspensión es el correctivo disciplinario que se impone a la persona militar por observar mala conducta consistente en:", "opciones": ["la reclusión que sufre un militar por un término de 24 horas a 15 días en un recinto castrense por infracciones a las leyes. [LDEFAGN General]", "la medida coercitiva que se impone por haber infringido leyes o reglamentos militares, siempre y cuando no constituyan un delito. [LDEFAGN General]", "la separación del empleo hasta por treinta días, sin goce de haberes y demás emolumentos, así como la interrupción del tiempo de servicios.", "el proceso administrativo por el cual la Secretaría verifica el cumplimiento de los requisitos fijados por la Ley de Ascensos. [LAREFAGN General]"], "correcta": 2}, {"num": 28, "contexto": "El Código de Justicia Militar protege la integridad de los informes oficiales, sancionando la falsedad en la comunicación hacia los mandos.", "pregunta": "Será sancionado quien sobre cualquier asunto del servicio dé a sus superiores, por escrito o de palabra:", "opciones": ["órdenes de interés personal a una persona subordinada o estorbare la ejecución de las que éste hubiere dado.", "testimonio o copia certificada supuestos de documentos militares que no existan o que carezcan de requisitos.", "recursos o reclamaciones en voz de cuerpo, ya sea uno en representación de otros, o dos o más reunidos. [CJM General]", "informe o parte contrario a lo que sepa."], "correcta": 3}, {"num": 29, "contexto": "La Ley del ISSFAM establece presunciones legales sobre el origen de la muerte o incapacidad del personal militar para agilizar los trámites de beneficios.", "pregunta": "Se presume la relación de causalidad entre las lesiones y la incapacidad o la muerte, salvo prueba en contrario, cuando estas ocurran antes de transcurridos:", "opciones": ["dos años de recibidas las lesiones en acción de armas o en otros actos del servicio.", "45 días hábiles siguientes a la fecha en que el Instituto reciba la documentación proveniente de la Dirección.", "tres años de acaecidos los hechos que ocasionaron la muerte por enfermedad contraída en actos del servicio.", "cinco días hábiles siguientes a la fecha en que el militar o sus beneficiarios entreguen la documentación."], "correcta": 0}, {"num": 30, "contexto": "En la clasificación de los delitos contra la fe pública militar, se sancionan los actos de falsedad documental y usurpación de calidades.", "pregunta": "Comete un delito la persona militar que en un documento militar:", "opciones": ["solicite previa autorización judicial a los concesionarios la localización geográfica en tiempo real de equipos.", "se atribuya o atribuya a la persona a cuyo nombre extienda el documento, un nombre o una investidura, calidad o circunstancia que no tenga.", "aplique medidas de apremio contra personas con discapacidad visual, auditiva o de locución para firmar actas.", "rinda un parte contrario a lo que sepa si de ello resultare grave perjuicio a la tropa o embarcación."], "correcta": 1}, {"num": 31, "contexto": "El Reglamento General de Deberes Militares instruye a los Oficiales sobre su comportamiento ejemplar y la guía que deben representar para el personal subordinado.", "pregunta": "Los Oficiales Subtenientes y Tenientes vigilarán que sus inferiores procedan con estricto apego al cumplimiento de su deber:", "opciones": ["reconociendo como superior jerárquico únicamente a los generales de brigada con jerarquía en activo.", "tolerando entre sus inferiores las murmuraciones contra el servicio o conversaciones poco respetuosas acerca de sus superiores.", "manteniéndose vivo en ellos el amor a la carrera, constituyéndose en un ejemplo constante por su conducta y caballerosidad.", "no dudando en recurrir a los consejos de sus superiores en cualquiera dificultad de carácter oficial o privado."], "correcta": 2}, {"num": 32, "contexto": "La Ley del ISSFAM regula los tiempos administrativos de respuesta para garantizar la seguridad social del personal.", "pregunta": "Al recibir el Instituto la documentación de los retiros, realizará el estudio de los antecedentes y formulará un dictamen sobre la procedencia del beneficio, su naturaleza y su monto, dentro de los:", "opciones": ["cinco días hábiles siguientes a la fecha de entrega de la orden de baja del activo.", "30 días naturales a partir de la fecha en que el Instituto tenga conocimiento del fallecimiento.", "tres meses de anticipación al vencimiento del periodo de reserva de la información.", "45 días hábiles siguientes."], "correcta": 3}, {"num": 33, "contexto": "El Código de Justicia Militar amplía el concepto de insubordinación para cubrir situaciones de convivencia fuera de las horas reglamentarias de trabajo.", "pregunta": "Se entenderá que la insubordinación se comete en el servicio cuando tenga lugar el delito:", "opciones": ["con motivo de actos del servicio, aun cuando se encuentren francos el personal subordinado y el superior.", "con el ánimo de causar daño o de violar la ley en contra de la Hacienda Pública Federal.", "por imprudencia, negligencia, impericia, falta de reflexión o de cuidado de los mandos subordinados. [CJM General]", "bajo protesta de decir verdad sin desempeñar empleo, cargo o comisión en el servicio público."], "correcta": 0}, {"num": 34, "contexto": "El Reglamento de la Ley de Ascensos (RLAREFAM) especifica el medio probatorio oficial para verificar la trayectoria administrativa en el grado actual.", "pregunta": "El tiempo de servicios en el Grado se acreditará con el:", "opciones": ["certificado que acredite el servicio que desempeñaba el militar al recibir las lesiones.", "extracto de antecedentes que elaboren las Direcciones, mismas que encuadran al personal que controlan administrativamente.", "dictamen pericial de dos médicos militares o navales especialistas designados por la Secretaría.", "certificado de autopsia y dictamen médico de relación de causalidad expedido por autoridad competente."], "correcta": 1}, {"num": 35, "contexto": "La Ley del ISSFAM establece el esquema de financiamiento del Seguro de Vida Militar Obligatorio a cargo de la Hacienda Pública.", "pregunta": "El importe de la prima correspondiente al seguro de vida de los militares en servicio estará a cargo del Gobierno Federal y será del:", "opciones": ["3.0% (tres punto cero por ciento) en el caso del personal de procesados o sentenciados que se mantengan en el activo.", "1.0% (uno punto cero por ciento) de los recursos totales que administre el fondo para gastos de operación.", "2.0% (dos punto cero por ciento) de los haberes y el sobrehaber que disfrute el militar en la República Mexicana.", "1.8% (uno punto ocho por ciento) del haber y sobrehaber mínimo vigente actualizado en su grado."], "correcta": 2}, {"num": 36, "contexto": "El Código de Justicia Militar sanciona las conductas de mando que interfieren indebidamente con el desempeño profesional o personal de los subordinados.", "pregunta": "Será sancionada la persona militar que estorbare sin motivo justificado la ejecución de las que un subordinado hubiere dado en uso de sus facultades, o bien:", "opciones": ["que oculte a sabiendas la verdad ante los tribunales u oficinas militares.", "que presente documentos o certificados falsos con objeto de comprobar servicios militares.", "que realice actos u omisiones para participar en procedimientos administrativos estando impedido.", "le exigiese el de actos que no tengan relación con el servicio."], "correcta": 3}, {"num": 37, "contexto": "En la resolución de controversias sobre beneficios de retiro, la Ley del ISSFAM impone plazos de resolución definitiva a las áreas administrativas.", "pregunta": "En los casos en que los militares formulen objeciones a las declaraciones de retiro de la Secretaría que corresponda, dicha Dirección formulará su declaración definitiva dentro de los:", "opciones": ["45 días hábiles siguientes.", "quince días hábiles a partir del día siguiente al en que se le notifique la misma.", "30 días naturales desde el día en que el Instituto tenga conocimiento del deceso.", "cinco días hábiles contados a partir de la notificación de la resolución impugnada."], "correcta": 0}, {"num": 38, "contexto": "La LAREFAGN define las reglas de desempate en la antigüedad cuando existen coincidencias en las fechas de obtención de la jerarquía.", "pregunta": "Si dos militares del mismo grado tienen nombramiento o patente con antigüedad de igual fecha, deberá considerarse como el más antiguo al que:", "opciones": ["tenga la Clave Única de Registro de Población con mayor tiempo de registro oficial.", "hubiere servido más tiempo en el grado anterior.", "tuviere mayor tiempo de servicios efectivos prestados de manera ininterrumpida.", "sea de mayor edad cronológica al momento de causar alta en la planilla orgánica."], "correcta": 1}, {"num": 39, "contexto": "En ausencia de una designación expresa de beneficiarios por parte del militar, la Ley del ISSFAM establece un orden jerárquico de familiares con derecho.", "pregunta": "Tienen derecho a los beneficios del Seguro de Vida Militar los familiares que el militar haya designado y a falta de designación los señalados en la Ley, entre ellos:", "opciones": ["Los hermanos menores de edad que dependan económicamente del militar hasta los 25 años de edad.", "Los hijos pensionados, siempre que no estén incapacitados o estudiando.", "La madre conjuntamente con el padre.", "La cónyuge o concubina, después de los trescientos días siguientes al fallecimiento."], "correcta": 2}, {"num": 40, "contexto": "El Código de Justicia Militar tipifica delitos de falsedad que buscan beneficiar indebidamente la carrera militar mediante la alteración de hechos históricos o créditos.", "pregunta": "Incurre en delito quien expida certificado con objeto de comprobar servicios militares o antigüedad, sabiendo que es:", "opciones": ["contrario a lo que sepa sobre cualquier asunto del servicio dado por escrito.", "improcedente por estimar comprobada la personalidad militar del interesado.", "fiable y coherente de acuerdo con el recto raciocinio de la relación de los hechos.", "falso lo que certifica, refiere o asegura."], "correcta": 3}, {"num": 41, "contexto": "En la determinación de las responsabilidades penales, el Código de Justicia Militar detalla las acciones que definen la autoría material en la consumación de un ilícito.", "pregunta": "Son autores de un delito:", "opciones": ["los que ayudan a los autores de un delito en los preparativos de éste.", "los que ejecuten materialmente el acto en que el delito queda consumado.", "los que sin previo concierto con los delincuentes, los favorecen auxiliándolos.", "los que ocultan a sabiendas la verdad sobre un hecho ante la autoridad superior."], "correcta": 1}, {"num": 42, "contexto": "La Ley de Ascensos y Recompensas (LAREFAGN) establece los mecanismos para cubrir las vacantes en los grados de oficiales y jefes en tiempo de paz.", "pregunta": "La promoción general para los Subtenientes hasta Mayores de las armas, servicios o de Guardia Nacional se realiza:", "opciones": ["por acreditación de la aptitud profesional en la promoción especial para Subtenientes.", "por aprobación satisfactoria de los cursos de formación en las escuelas militares.", "por concurso de selección para cubrir las plazas de Subteniente a Teniente Coronel.", "por rigurosa escala jerárquica atendiendo exclusivamente a la antigüedad acumulada."], "correcta": 2}, {"num": 43, "contexto": "Para los efectos legales de seguridad social, es fundamental distinguir los conceptos de la remuneración básica de los militares.", "pregunta": "¿Cómo se define el concepto de 'Haber o haberes' según la Ley del ISSFAM?", "opciones": ["la percepción base que se establece en el tabulador que expide la Secretaría de Hacienda y Crédito Público.", "la prestación económica vitalicia a que tienen derecho los familiares de los militares.", "la percepción a que se refieren los artículos de la Ley de Ascensos y Recompensas.", "el monto total de las gratificaciones anuales por servicios destacados en campaña."], "correcta": 0}, {"num": 44, "contexto": "Las pruebas de capacidad física en los concursos de selección tienen criterios de puntuación basados en el rendimiento incremental sobre las distancias mínimas.", "pregunta": "En la carrera de resistencia para la capacidad física, de acuerdo con el Reglamento de la Ley:", "opciones": ["se asignarán 10 puntos por cada 100 metros recorridos entre la distancia mínima y la máxima.", "se asignarán 5 puntos por cada 100 metros recorridos entre la distancia mínima y la máxima.", "el recorrido inferior a la distancia mínima establecida para cada edad se calificará con la pérdida de 5 puntos.", "se asignará una puntuación de 40 puntos si se completa el recorrido en el tiempo máximo sin detenciones."], "correcta": 1}, {"num": 45, "contexto": "La Ley de Disciplina prevé sanciones que afectan la situación administrativa del personal por incurrir en faltas graves a sus deberes.", "pregunta": "La suspensión es el correctivo disciplinario que se impone a la persona militar por observar mala conducta, consistente en la:", "opciones": ["medida coercitiva que se impone por haber infringido leyes o reglamentos militares, sin constituir delito.", "reclusión que sufre un militar por un término de 24 horas a 15 días en un recinto castrense.", "separación del empleo hasta por treinta días, sin goce de haberes y demás emolumentos, así como la interrupción del tiempo de servicios.", "amonestación por escrito que invita al subalterno a corregirse tras un defecto en el cumplimiento."], "correcta": 2}, {"num": 46, "contexto": "Los Oficiales Subalternos tienen la obligación de guiar a sus inferiores en el amor a la profesión militar y el respeto a la normativa.", "pregunta": "Los Oficiales Subtenientes y Tenientes vigilarán que sus inferiores procedan en igual forma, manteniéndose vivo en ellos el amor a la carrera, constituyéndose en un:", "opciones": ["superior jerárquico desde el Teniente hasta el General de División.", "ejemplo constante por su conducta y caballerosidad, y estricto apego al cumplimiento de su deber.", "inmediato responsable de la observancia de las disposiciones en los diversos servicios.", "guía técnico que facilite el desarrollo de las misiones de adiestramiento en su unidad."], "correcta": 1}, {"num": 47, "contexto": "El Código de Justicia Militar identifica conductas específicas de los oficiales que se consideran abandono del servicio ante el movimiento de las tropas.", "pregunta": "Serán considerados también como desertores, los oficiales que sin justa causa se desvíen del derrotero que se les hubiere señalado como indispensable en el pasaporte, o bien:", "opciones": ["que con pretexto de enfermedad u otro motivo ilegítimo se queden en las poblaciones, sin el correspondiente permiso, cuando marchen las fuerzas a que pertenezcan.", "que sin la orden correspondiente ni motivo justificado, no lleguen al punto de su destino con la debida oportunidad.", "que se regresen después de emprendida una marcha sin motivo justificado.", "Todas las anteriores son correctas según el Artículo 269."], "correcta": 3}, {"num": 48, "contexto": "La Ley del ISSFAM define los supuestos de prelación para el otorgamiento de beneficios económicos a los familiares tras el fallecimiento del militar.", "pregunta": "Se consideran familiares de los militares, para los efectos de pensión y/o compensación:", "opciones": ["la concubina o el concubinario solos o en concurrencia con los hijos menores de edad.", "los ascendientes en línea recta que dependan económicamente del militar en situación de activo.", "la viuda o el viudo solos o en concurrencia con los hijos, o estos solos si son menores de edad.", "los hermanos y hermanas menores de edad, en cualquier momento posterior al deceso."], "correcta": 2}, {"num": 49, "contexto": "El reconocimiento a los servicios ininterrumpidos se materializa a través de distinciones que premian la lealtad y permanencia en las instituciones armadas.", "pregunta": "La condecoración de perseverancia premiará los:", "opciones": ["actos de heroísmo, capacidad profesional o servicios a la Patria.", "servicios ininterrumpidos en el activo, a los miembros del Ejército, Fuerza Aérea o Guardia Nacional.", "hechos meritorios ejecutados por uno o más militares a sus órdenes.", "primeros premios obtenidos en todos los años de sus estudios militares."], "correcta": 1}, {"num": 50, "contexto": "La acreditación de la antigüedad en el empleo actual es un requisito documental indispensable para participar en los procesos de ascenso.", "pregunta": "El tiempo de servicios en el Grado se acreditará con el:", "opciones": ["extracto de antecedentes que elaboren las Direcciones, mismas que encuadran al personal que controlan administrativamente.", "certificado médico de aptitud física para el desempeño de las funciones de la jerarquía inmediata superior.", "memorial de servicios expedido por la Jefatura de la Oficina Administrativa de la Unidad.", "informe de conducta civil y militar emitido por el Comandante u organismo del que dependa."], "correcta": 0}, {"num": 51, "contexto": "El Código de Justicia Militar protege la disciplina imponiendo sanciones a quienes realicen reclamaciones de manera colectiva.", "pregunta": "Se sancionará a quienes eleven a sus superiores recursos, peticiones, quejas o reclamaciones en:", "opciones": ["voz de cuerpo, siempre que lo hicieren salvando conductos necesarios.", "el portal electrónico institucional durante el plazo de un año de que los actos comenzaran.", "forma clara y precisa, con consideraciones de hecho y de derecho aplicables.", "voz de cuerpo, ya sea uno en representación de otros, o dos o más reunidos."], "correcta": 3}, {"num": 52, "contexto": "La suspensión como correctivo disciplinario implica no solo la separación del cargo, sino también la afectación de los derechos económicos y de antigüedad.", "pregunta": "De acuerdo con la Ley de Disciplina, la suspensión es el correctivo disciplinario determinado por el Consejo de Honor o por el Consejo Superior de Disciplina, consistente en la:", "opciones": ["reclusión que sufre un militar por un término de 24 horas a 15 días en un recinto castrense.", "medida coercitiva que se impone por haber infringido las leyes o reglamentos militares.", "separación del empleo hasta por treinta días, sin goce de haberes y demás emolumentos, así como la interrupción del tiempo de servicios.", "privación temporal de la remuneración, honores e insignias correspondientes a la persona sentenciada."], "correcta": 2}, {"num": 53, "contexto": "La Ley General de Responsabilidades Administrativas define el universo de sujetos obligados bajo un marco constitucional específico.", "pregunta": "Personas Servidoras Públicas: Las personas que desempeñan un empleo, cargo o comisión en los entes públicos, en el ámbito federal y local, conforme a lo dispuesto en el artículo:", "opciones": ["108 de la Constitución Política de los Estados Unidos Mexicanos.", "89, fracción I de la Constitución Política de los Estados Unidos Mexicanos.", "73, fracción XIV de la Constitución Política de los Estados Unidos Mexicanos.", "21 de la Constitución Política de los Estados Unidos Mexicanos."], "correcta": 0}, {"num": 54, "contexto": "El sistema de estímulos militares contempla reconocimientos públicos para acciones que merecen ser emuladas por el resto de la tropa.", "pregunta": "Las Citaciones se otorgarán cuando a juicio del Comandante de una Unidad o Jefe de una Dependencia deba estimularse:", "opciones": ["el acto de mando mediante el cual es conferido al militar un grado superior.", "un hecho meritorio ejecutado por uno o más militares a sus órdenes, publicándose en la Orden Particular.", "el proceso mediante el cual la Secretaría verifica el cumplimiento de los requisitos fijados por la Ley.", "la privación temporal de la remuneración y el uso de condecoraciones por infracciones leves."], "correcta": 1}, {"num": 55, "contexto": "En las declaraciones patrimoniales, el personal militar está obligado a informar sobre la situación económica de su núcleo familiar más cercano.", "pregunta": "Los Declarantes estarán obligados a proporcionar a las Secretarías y los Órganos internos de control, la información que se requiera para verificar la evolución de su situación patrimonial, incluyendo la de sus:", "opciones": ["familiares directos en línea ascendente o descendente hasta el segundo grado.", "dependientes económicos que residan en el extranjero bajo cualquier régimen.", "ascendientes y colaterales que hayan sido beneficiarios de una pensión militar.", "cónyuges, concubinas o concubinarios, dependientes económicos directos o integrantes de sociedades de convivencia."], "correcta": 3}, {"num": 56, "contexto": "El proceso de promoción se divide en etapas cronológicas que delimitan las responsabilidades de las autoridades y los participantes.", "pregunta": "La fase 'B' de la Segunda Etapa de las promociones consiste en la:", "opciones": ["aplicación del examen médico final realizado por el hospital correspondiente.", "presentación de exámenes teóricos y pruebas prácticas.", "aplicación de la prueba de capacidad física bajo los términos que señale el instructivo.", "concentración del personal en las fechas y condiciones que determine la Secretaría."], "correcta": 1}, {"num": 57, "contexto": "La disciplina militar impone a los superiores la responsabilidad ineludible de garantizar que sus disposiciones se materialicen sin demora.", "pregunta": "Todo Militar que dé una orden, tiene el deber de exigir que se cumpla, y los oficiales y las clases inferiores el de:", "opciones": ["obedecer todas las órdenes del servicio que reciban de sus superiores directos.", "advertir al subalterno, de palabra o por escrito, la omisión o defecto observado.", "vigilar su ejecución.", "fundamentar de hecho y de derecho la impracticabilidad de la misma en caso de error."], "correcta": 2}, {"num": 58, "contexto": "El Código de Justicia Militar define a los encubridores basándose en el tipo de ayuda prestada a los delincuentes después de la consumación del delito.", "pregunta": "Son encubridores de primera clase, los que sin previo concierto con los delincuentes, los favorecen de alguno de los modos siguientes: I.- Auxiliándolos para que se aprovechen de los instrumentos con que se comete el delito... II.- procurando por cualquier medio impedir que se averigüe el delito... y:", "opciones": ["proporcionando los instrumentos o armas adecuados para la ejecución material.", "ayudando a los autores de un delito en los preparativos de éste facilitando medios.", "abusando de su autoridad o poder para inducir a otro a delinquir mediante dádivas.", "ocultando a éstos, si tienen costumbre de hacerlo, u obran por retribución dada o prometida."], "correcta": 3}, {"num": 59, "contexto": "Los plazos para cumplir con las obligaciones de transparencia patrimonial son estrictos y su omisión puede invalidar el contrato o nombramiento.", "pregunta": "De acuerdo con la Ley General de Responsabilidades Administrativas, la declaración de conclusión del encargo debe presentarse dentro de los:", "opciones": ["sesenta días naturales siguientes a la conclusión.", "treinta días naturales siguientes a la fecha en que hubiere notificado el requerimiento.", "cinco días hábiles contados a partir de la notificación de la resolución impugnada.", "diez días hábiles siguientes a la emisión del acuerdo de conclusión del expediente."], "correcta": 0}, {"num": 60, "contexto": "Los principios de la guerra son el fundamento de la doctrina militar y deben regir cualquier actividad dentro de la institución para asegurar el éxito.", "pregunta": "Este principio de la guerra significa simpleza, sin artificio, sin complicación, algo no complejo; debe de manifestarse en la concepción, preparación y conducción de las operaciones militares:", "opciones": ["Seguridad.", "Sencillez.", "Sorpresa.", "Unidad de mando."], "correcta": 1}, {"num": 61, "contexto": "Un militar que ha dedicado su vida profesional al servicio solicita su retiro tras 25 años. Para determinar el monto de su beneficio económico, el Instituto de Seguridad Social debe verificar la integración legal de su antigüedad.", "pregunta": "El tiempo de servicios comprende:", "opciones": ["únicamente el tiempo efectivo de servicios prestados en unidades de combate o dependencias técnicas.", "tanto el de los efectivos como el de los abonos y será computado en la forma establecida en la Ley para la Comprobación, Ajuste y Cómputo de Servicios.", "el lapso en el que el personal de una misma especialidad y jerarquía presenta los exámenes de promoción que corresponda.", "la percepción base que se establece en el tabulador que expide la Secretaría de Hacienda y Crédito Público."], "correcta": 1}, {"num": 62, "contexto": "Durante una inspección técnica en una Clínica Dental Militar, un Capitán nota una falta menor en el cumplimiento let currentQuestion = 0;
let showingAll = false;
let userAnswers = new Array(preguntas.length).fill(null);

function escapeHtml(text){const div=document.createElement('div');div.textContent=text;return div.innerHTML;}

function buildQuestions(){
 const container=document.getElementById('Questions'); container.innerHTML='';
 preguntas.forEach((q,qi)=>{
   const li=document.createElement('li'); li.className='QuizQuestion'; li.id='Q_'+qi; li.style.display=qi===0?'':'none';
   const contexto=document.createElement('div'); contexto.className='contexto'; contexto.innerHTML='<strong>Contexto:</strong> '+escapeHtml(q.contexto); li.appendChild(contexto);
   const qText=document.createElement('div'); qText.className='QuestionText'; qText.innerHTML='<strong>Pregunta '+q.num+':</strong> '+escapeHtml(q.pregunta); li.appendChild(qText);
   const ol=document.createElement('ol'); ol.className='MCAnswers';
   q.opciones.forEach((op,oi)=>{
      const opt=document.createElement('li');
      const label=document.createElement('label');
      const radio=document.createElement('input'); radio.type='radio'; radio.name='question_'+qi; radio.value=oi; radio.checked=userAnswers[qi]===oi;
      radio.addEventListener('change', ()=>{userAnswers[qi]=oi; document.getElementById('status_'+qi).innerHTML='';});
      label.appendChild(radio); label.appendChild(document.createTextNode(' '+op)); opt.appendChild(label); ol.appendChild(opt);
   });
   li.appendChild(ol);
   const status=document.createElement('div'); status.className='status-line'; status.id='status_'+qi; li.appendChild(status);
   container.appendChild(li);
 });
 setQNumReadout();
}
function setQNumReadout(){document.getElementById('QNumReadout').textContent=(currentQuestion+1)+' / '+preguntas.length;document.getElementById('PrevQButton').style.visibility=currentQuestion<=0?'hidden':'visible';document.getElementById('NextQButton').style.visibility=currentQuestion>=preguntas.length-1?'hidden':'visible';}
function changeQ(delta){if(showingAll)return; const next=currentQuestion+delta; if(next<0||next>=preguntas.length)return; document.getElementById('Q_'+currentQuestion).style.display='none'; currentQuestion=next; document.getElementById('Q_'+currentQuestion).style.display=''; setQNumReadout();}
function toggleAllQuestions(){showingAll=!showingAll; const button=document.getElementById('ShowMethodButton'); const readout=document.getElementById('OneByOneReadout'); for(let i=0;i<preguntas.length;i++){document.getElementById('Q_'+i).style.display=showingAll?'':(i===currentQuestion?'':'none');} document.getElementById('Questions').style.listStyleType=showingAll?'decimal':'none'; readout.style.display=showingAll?'none':''; button.textContent=showingAll?'MOSTRAR PREGUNTAS DE UNA EN UNA':'MOSTRAR TODAS LAS PREGUNTAS';}
function showFeedback(html){document.getElementById('FeedbackContent').innerHTML=html; document.getElementById('overlay').style.display='block'; document.getElementById('FeedbackDiv').style.display='block'; document.getElementById('FeedbackOKButton').focus();}
function hideFeedback(){document.getElementById('overlay').style.display='none'; document.getElementById('FeedbackDiv').style.display='none';}
function reviewCurrent(){const selected=userAnswers[currentQuestion]; if(selected===null){showFeedback('Seleccione una respuesta antes de revisar.'); return;} const q=preguntas[currentQuestion]; if(selected===q.correcta){document.getElementById('status_'+currentQuestion).innerHTML='CORRECTO'; showFeedback('CORRECTO');} else {const letra=['A','B','C','D'][q.correcta]; const texto=q.opciones[q.correcta]; const msg='INCORRECTO. Respuesta correcta: '+letra+') '+escapeHtml(texto); document.getElementById('status_'+currentQuestion).innerHTML=msg; showFeedback('INCORRECTO<br><br>RESPUESTA CORRECTA: '+letra+') '+escapeHtml(texto));}}
function finishExam(){let contestadas=0, aciertos=0; preguntas.forEach((q,i)=>{if(userAnswers[i]!==null)contestadas++; if(userAnswers[i]===q.correcta)aciertos++;}); const res=document.getElementById('resultadoFinal'); res.style.display='block'; res.innerHTML='<strong>RESULTADO FINAL</strong><br><br>TOTAL DE PREGUNTAS: '+preguntas.length+'<br>PREGUNTAS CONTESTADAS: '+contestadas+'<br>TOTAL DE ACIERTOS: '+aciertos+'<br><br><span class="note">Este archivo conserva exactamente la redacción cargada en las preguntas y opciones.</span>'; document.getElementById('InstructionsDiv').innerHTML='SU CALIFICACIÓN ES: '+aciertos+' / '+preguntas.length; if(!showingAll){window.scrollTo({top:0,behavior:'smooth'});}}
buildQuestions();
</script>
